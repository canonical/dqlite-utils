name: dqlite-utils
base: core24
summary: A utility to monitor dqlite on-disk state
description: |
  `dqlite-utils` is an observability tool for inspecting the on-disk state of a dqlite node. The inspected dqlite node does not have to be stopped and does not have to be the leader allowing issues to be debugged without interacting with a live process or the rest of the cluster.
adopt-info: dqlite-utils

grade: stable
confinement: strict

apps:
  dqlite-utils:
    command: bin/dqlite-utils
    plugs:
      - home
      - removable-media

parts:
  dqlite-utils:
    plugin: rust
    source: .
    build-packages:
      - libdqlite1.18-unstable-dev
    build-snaps:
      - jq
    override-pull: |
      // TODO(kcza): replace this, it's dumb.
      rustup default stable

      craftctl default
      craftctl set version="$(cargo metadata --format-version=1 | jq --raw-output --exit-status .packages[0].version)"

package-repositories:
  - type: apt
    ppa: dqlite/dev
