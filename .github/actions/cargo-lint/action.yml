name: Cargo Lint
description: Runs various cargo checks and lints for the project.

runs:
  using: 'composite'
  steps:
    - name: Check formatting with cargo fmt
      shell: bash
      run: cargo fmt --all --check

    - name: Check project (default features)
      shell: bash
      run: cargo check --locked

    - name: Check project (all features)
      shell: bash
      run: cargo check --locked --all-features

    - name: Run Clippy
      shell: bash
      run: cargo clippy --locked --all-features --all-targets --tests

    - name: Build documentation
      shell: bash
      run: cargo doc --no-deps
