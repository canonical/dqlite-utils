[package]
name = "dqlite_utils"
version = "0.1.0"
rust-version = "1.91"
edition = "2024"
build = "build.rs"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.48", features = ["color", "derive", "wrap_help"] }
home = "0.5.11"
indoc = "2.0.7"
lz4_flex = "0.12.0"
owo-colors = { version = "4.2.3", features = ["supports-colors"] }
rustyline = "17.0.2"
shell-words = "1.1.0"
strum = { version = "0.27.2", features = ["derive"] }
thiserror = "2.0.17"

[[bin]]
name = "dqlite-utils"
path = "src/main.rs"

[build-dependencies]
bindgen = "0.72.1"
pkg-config = "0.3.32"

[dev-dependencies]
googletest = "0.14.2"
tempfile = "3.23.0"
