[package]
name = "dqlite_utils"
version = "0.1.0"
rust-version = "1.85"
edition = "2024"
build = "build.rs"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.48", features = ["color", "derive", "wrap_help"] }
home = "0.5.11"
owo-colors = { version = "4.2.3", features = ["supports-colors"] }
rustyline = "17.0.2"
shell-words = "1.1.0"

[[bin]]
name = "dqlite-utils"
path = "src/main.rs"

[build-dependencies]
autotools = "0.2"
bindgen = "0.72.1"
git2 = "0.20"
pkg-config = "0.3.32"

[dev-dependencies]
tempfile = "3.23.0"
