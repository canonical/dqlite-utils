[package]
name = "dqlite_utils"
version = "0.1.0"
rust-version = "1.91"
edition = "2024"
build = "build.rs"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.48", features = ["color", "derive", "wrap_help"] }
home = "0.5.11"
indoc = "2.0.7"
libsqlite3-sys = "0.35.0"
lz4_flex = "0.12.0"
owo-colors = { version = "4.2.3", features = ["supports-colors"] }
rand = "0.9.2"
rusqlite = { version = "0.37.0", features = ["bundled-full"] }
rustyline = "17.0.2"
shell-words = "1.1.0"
static_assertions = "1.1.0"
strum = { version = "0.27.2", features = ["derive"] }
thiserror = "2.0.17"
time = { version = "0.3.44", features = ["formatting", "parsing"] }

[[bin]]
name = "dqlite-utils"
path = "src/main.rs"

[build-dependencies]
bindgen = "0.72.1"
pkg-config = "0.3.32"

[dev-dependencies]
googletest = "0.14.2"
tempfile = "3.23.0"

[profile.release-small]
inherits = "release"
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
overflow-checks = true
debug = false
